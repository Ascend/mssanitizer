minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
  # pre-commit 基础检查
  - repo: https://gitcode.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # codespell
  - repo: https://gitcode.com/gh_mirrors/co/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [
            "-L",
            "CANN,cann,NNAL,nnal,ASCEND,ascend,EnQue,CopyIn,ArchType,AND,ND,nd,tbe,copyin,alog",
            "--skip",
            "*.py,*.cpp,*.hpp,*.c,*.h,pre-commit/typos.toml",
          ]

  # typos
  - repo: https://gitcode.com/gh_mirrors/ty/typos
    rev: v1.32.0
    hooks:
      - id: typos
        args: ["--force-exclude", "--config", "pre-commit/typos.toml"]

  #--------------- C++ 核心检查 ---------------------------------------------
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        require_serial: true
        files: \.(c|h|cpp|hpp|cc|hh|cxx|hxx)$
        entry: git-clang-format
        args: [--binary, clang-format, -f]
        exclude: \.(build|test|third-party)

  # -------------------------- Gitleaks 本地离线二进制扫描 --------------------------
  - repo: local
    hooks:
      - id: gitleaks-offline-scan
        name: Gitleaks Secret Scan(Local Binary)
        entry: ./gitleaks
        language: system
        pass_filenames: true
        args:
          - protect
          - --verbose
          - --redact
          - --config=pre-commit/.gitleaks.toml
        stages: [pre-commit]
   # --------------- C++ 静态检查（本地 clang-tidy）------------------
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy (本地venv)
        entry: clang-tidy
        language: system
        pass_filenames: true
        files: ^csrc/.+\.(c|h|cpp|hpp|cc|hh|cxx|hxx)$
        args:
          - "--config-file=.clang-tidy"
